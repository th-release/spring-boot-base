spring:
  config:
    activate:
      on-profile: local
  cloud:
    aws:
      # local 프로필용 AWS/S3 샘플 값
      s3:
        bucket: ""
      region:
        static: ap-northeast-2
      credentials:
        access-key: ""
        secret-key: ""

app:
  cors:
    # local CORS 정책
    allowedOrigins: [http://localhost:3000, http://localhost:8080]
    allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
    allowedHeaders: ["*"]
    exposedHeaders: ["Authorization", "Refresh-Token"]
    allowCredentials: true
    maxAge: 3600
  database:
    # local schema 설정
    jpa-schema: base
    flyway-schema: base
    flyway-history-schema: public
  logging:
    # 요청/응답 로깅과 민감정보 마스킹 정책
    request: true
    response: false
    exclude-urls: [/api/actuator, /api/swagger, /api/swagger-ui, /api/v3/api-docs]
    sensitive-fields: [password, newPassword, confirmPassword, accessToken, refreshToken, token, authorization, refresh_token, access_token, idToken, session, sessionid, sessiontoken, clientSecret, secret, secretkey, apiKey, api_key, privatekey, credential, credentials, otp, code, authcode, setcookie, cookie]
    sensitive-value-patterns: ['(?i)Bearer\s+[A-Za-z0-9._~+/\-=]+', '\b[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b', '(?i)(sk|rk)_[A-Za-z0-9]{16,}', '(?i)AKIA[0-9A-Z]{16}']
    max-payload-size: 1024
  swagger:
    # Swagger/OpenAPI 문서 기본 메타 정보
    scheme: bearer
    title: title
    description: description
    version: 1.0.0
  i18n:
    # local 다국어 설정
    enabled: true
    default-locale: ko
    supported-locales: [ko, en]
  redis:
    # local 캐시/토큰 저장 관련 Redis 설정
    enabled: false
    host: localhost
    port: "6379"
    cache-prefix: v1
  jwt:
    # local 프로필용 JWT 서명 키
    secret-key: "4zB0ZR7iYAfapSSkFfQKP33FYQHJx3o/frfaL2oZNvM9OvWt5IPUZaTH+3imbJGaNDN68VHWaCmB+IdyQHmWKQ=="
  cache:
    # 공통 캐시 정책
    default-ttl-seconds: 3600
    names: [user]
  token:
    # refresh token 저장 방식
    storage: rdb
    max-sessions-per-user: 5
  auth:
    # 로그인 실패 제한, 감사 로그, MFA on/off
    audit:
      enabled: true
      include-user-agent: true
    login-failure:
      enabled: true
      max-attempts: 5
      lock-minutes: 15
    password-reset:
      code-expire-minutes: 10
      max-verification-attempts: 5
      verification-lock-minutes: 15
    mfa:
      enabled: false
      issuer: spring-boot-base
      code-digits: 6
      time-step-seconds: 30
      allowed-windows: 1
      required-types: []
  admin:
    # 초기 관리자 계정 자동 생성 설정
    enabled: true
    username: admin
    password: "Admin1234!"
    nickname: 관리자
    email: admin@local.base
    reset-password-on-startup: false
  outbound:
    # 외부 API 호출 timeout/retry/header 정책
    connect-timeout-seconds: 5
    read-timeout-seconds: 5
    retry:
      max-attempts: 3
      delay-millis: 1000
    headers:
      forward-correlation-id: true
      add-idempotency-key: true
  privacy:
    # 개인정보 마스킹/보존 정책
    mask-audit-ip: true
    include-user-agent: true
    audit-retention-days: 90
  qr:
    # QR 코드 생성 기본값
    margin: 1
    charset: UTF-8
    format: PNG
    height: 300
    width: 300
  security:
    # local 보안 헤더 설정
    trusted-proxy:
      forwarded-headers-enabled: false
    headers:
      hsts-enabled: false
      content-security-policy: "default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
      referrer-policy: strict-origin-when-cross-origin
  email:
    # 이메일 유틸 on/off 및 SMTP 설정
    enabled: false
    host: localhost
    port: 587
    username: local-user
    password: local-password
    protocol: smtp
    auth: true
    starttls: true
    from-address: no-reply@local.base
    from-name: spring-boot-base-local
    connect-timeout-millis: 5000
    read-timeout-millis: 5000
    write-timeout-millis: 5000
  firebase:
    # Firebase 유틸 on/off 및 Admin SDK 설정
    enabled: false
    project-id: local-project
    credentials-path: ""
    credentials-json: ""
    database-url: ""
management:
  # local actuator 노출 범위
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, info
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
  health:
    redis:
      enabled: false
  metrics:
    tags:
      application: spring-boot-base
  prometheus:
    metrics:
      export:
        enabled: true

storage:
  local:
    # 로컬 파일 저장 경로와 접근 prefix
    path: ./uploads
    prefix: /api/v1/files/content
  upload:
    # 업로드 보안 정책
    enabled: true
    max-file-size: 10MB
    block-double-extension: true
  cleanup:
    # 고아 파일 정리 배치 설정
    cron: "0 0 3 * * *"
    chunk-size: 100
