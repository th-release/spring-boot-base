server:
  forward-headers-strategy: FRAMEWORK
  port: ${PORT:8080}

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # Redis 자동 설정을 완전히 제외 (우리가 CacheConfig에서 직접 제어함)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DATABASE_HOST:127.0.0.1}:${DATABASE_PORT:5432}/${DATABASE_DATABASE:base}?characterEncoding=UTF-8&allowMultiQueries=true&allowMultiQueries=true&currentSchema=${DATABASE_SCHEMA:public}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
    hikari:
      maximum-pool-size: 50
      connection-timeout: 2000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    aws:
      s3:
        bucket: ${AWS_S3_BUCKET:}
      region:
        static: ${AWS_REGION:ap-northeast-2}
      credentials:
        access-key: ${AWS_ACCESS_KEY:}
        secret-key: ${AWS_SECRET_KEY:}

crypto:
  aes:
    # 32 bytes (256 bits) Base64 encoded key
    secret-key: ${AES_SECRET_KEY:R3zmKTgCnAp1m0zRd5DCVmTA3GQhYPYd+iJsbk1+l9c=}

app:
  cors:
    allowedOrigins:
      - "http://localhost:3000"
      - "http://localhost:8080"
    allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
    allowedHeaders: ["*"]
    exposedHeaders: ["Authorization", "Refresh-Token"]
    allowCredentials: true
    maxAge: 3600
  redis:
    enabled: ${REDIS_ENABLED:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  token:
    storage: ${TOKEN_STORAGE:rdb} # cache (Redis/Local), rdb (Database)
  qr:
    margin: ${QR_MARGIN:1}
    charset: ${QR_CHARSET:UTF-8}
    format: ${QR_FORMAT:PNG}
    height: ${QR_HEIGHT:300}
    width: ${QR_WIDTH:300}
  logging:
    request: true
    response: false
    exclude-urls:
      - /api/actuator
      - /api/swagger
      - /api/swagger-ui
      - /api/v3/api-docs
  swagger:
    scheme: bearer
    title: title
    description: description
    version: 1.0.0

springdoc:
  swagger-ui:
    path: /api/swagger
    groups-order: DESC
    tags-sorter: alpha
    operations-sorter: method
  paths-to-match:
    - /**

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
  # Redis 헬스 체크도 비활성화 (연결 시도 방지)
  health:
    redis:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name:spring-boot-base}
  prometheus:
    metrics:
      export:
        enabled: true

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j

storage:
  local:
    path: ./uploads
    prefix: /api/files
  cleanup:
    cron: "0 0 3 * * *"  # 매일 새벽 3시 / 비활성화: "-"
    # fixed-rate: 21600000 # ms 단위, 사용하려면 주석 해제 (예: 6시간)
    chunk-size: 100