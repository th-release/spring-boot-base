server:
  # 프록시/로드밸런서 뒤에서 전달된 헤더를 Spring MVC가 신뢰하도록 설정
  forward-headers-strategy: FRAMEWORK
  # 애플리케이션 기본 포트
  port: ${PORT:8080}

spring:
  # 기본 활성 프로필. 별도 지정이 없으면 local 사용
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    # 공통 DB 연결 정보. 실제 스키마는 JPA_SCHEMA/currentSchema 로 제어
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DATABASE_HOST:127.0.0.1}:${DATABASE_PORT:5432}/${DATABASE_DATABASE:base}?characterEncoding=UTF-8&allowMultiQueries=true&allowMultiQueries=true&currentSchema=${JPA_SCHEMA:public}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
    hikari:
      maximum-pool-size: ${DATABASE_MAXIMUM_POOL_SIZE:50}
      connection-timeout: ${DATABASE_CONNECTION_TIMEOUT:2000}
      validation-timeout: ${DATABASE_VALIDATION_TIMEOUT:5000}
  jpa:
    hibernate:
      # 베이스 프로젝트 기본값. 운영에서는 migration 중심 관리 권장
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        default_schema: ${JPA_SCHEMA:public}
  flyway:
    # Flyway와 JPA는 서로 다른 schema를 보도록 분리 가능
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    default-schema: ${FLYWAY_SCHEMA:${DATABASE_SCHEMA:public}}
    schemas: ${FLYWAY_SCHEMAS:${FLYWAY_SCHEMA:${DATABASE_SCHEMA:public}}}
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # Redis 자동 설정을 완전히 제외 (우리가 CacheConfig에서 직접 제어함)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
crypto:
  aes:
    # AES 암복호화 키
    secret-key: ${AES_SECRET_KEY:R3zmKTgCnAp1m0zRd5DCVmTA3GQhYPYd+iJsbk1+l9c=}

springdoc:
  # Swagger UI와 OpenAPI 문서 경로 설정
  api-docs:
    enabled: ${SWAGGER_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
    path: /api/swagger
    groups-order: DESC
    tags-sorter: alpha
    operations-sorter: method
  paths-to-match:
    - /**

decorator:
  datasource:
    p6spy:
      # SQL 확인용 p6spy 설정
      enable-logging: true
      multiline: true
      logging: slf4j
