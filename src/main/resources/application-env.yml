spring:
  config:
    activate:
      # env 프로필에서만 이 파일을 활성화
      on-profile: env
  cloud:
    aws:
      # env 프로필은 커스텀 기능 값을 환경변수로 받는 배포 전용 프로필
      s3:
        # S3 버킷 이름
        bucket: ${AWS_S3_BUCKET:}
      region:
        # AWS 리전
        static: ${AWS_REGION:ap-northeast-2}
      credentials:
        # AWS Access Key
        access-key: ${AWS_ACCESS_KEY:}
        # AWS Secret Key
        secret-key: ${AWS_SECRET_KEY:}

app:
  cors:
    # CORS 허용 origin 목록
    allowedOrigins:
      - ${CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
      - ${CORS_ALLOWED_ORIGIN_2:http://localhost:8080}
    # CORS 허용 HTTP 메서드
    allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
    # CORS 허용 헤더
    allowedHeaders: ["*"]
    # 브라우저에 노출할 응답 헤더
    exposedHeaders: ["Authorization", "Refresh-Token"]
    # 쿠키/인증정보 포함 허용 여부
    allowCredentials: true
    # preflight 캐시 시간(초)
    maxAge: 3600
  database:
    # JPA가 사용할 schema
    jpa-schema: ${JPA_SCHEMA:${DATABASE_SCHEMA:base}}
    # Flyway migration SQL이 테이블을 생성/변경할 schema
    flyway-schema: ${FLYWAY_SCHEMA:${DATABASE_SCHEMA:base}}
    # Flyway schema history table을 저장할 schema
    flyway-history-schema: ${FLYWAY_HISTORY_SCHEMA:public}
  logging:
    # 요청 로깅 활성화 여부
    request: true
    # 응답 로깅 활성화 여부
    response: false
    # 로깅 제외 URL prefix 목록
    exclude-urls: [/api/actuator, /api/swagger, /api/swagger-ui, /api/v3/api-docs]
    # 키 이름 기준 민감정보 마스킹 대상
    sensitive-fields: [password, newPassword, confirmPassword, accessToken, refreshToken, token, authorization, refresh_token, access_token, idToken, session, sessionid, sessiontoken, clientSecret, secret, secretkey, apiKey, api_key, privatekey, credential, credentials, otp, code, authcode, setcookie, cookie]
    # 값 패턴 기준 민감정보 마스킹 대상 정규식
    sensitive-value-patterns: ['(?i)Bearer\s+[A-Za-z0-9._~+/\-=]+', '\b[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b', '(?i)(sk|rk)_[A-Za-z0-9]{16,}', '(?i)AKIA[0-9A-Z]{16}']
    # 최대 로깅 payload 길이
    max-payload-size: 1024
  swagger:
    # Swagger 보안 스키마 이름
    scheme: bearer
    # Swagger 문서 제목
    title: title
    # Swagger 문서 설명
    description: description
    # Swagger 문서 버전
    version: 1.0.0
  i18n:
    # 다국어 기능 활성화 여부
    enabled: ${I18N_ENABLED:true}
    # 기본 로케일
    default-locale: ${I18N_DEFAULT_LOCALE:ko}
    # 지원 로케일 목록
    supported-locales: [ko, en]
  redis:
    # Redis 캐시 및 토큰 저장 설정
    # Redis 기능 활성화 여부
    enabled: ${REDIS_ENABLED:false}
    # Redis 호스트
    host: ${REDIS_HOST:localhost}
    # Redis 포트
    port: ${REDIS_PORT:6379}
    # Redis 캐시 키 prefix
    cache-prefix: ${REDIS_CACHE_PREFIX:v1}
  jwt:
    # JWT 서명 키
    secret-key: ${JWT_SECRET_KEY:4zB0ZR7iYAfapSSkFfQKP33FYQHJx3o/frfaL2oZNvM9OvWt5IPUZaTH+3imbJGaNDN68VHWaCmB+IdyQHmWKQ==}
  cache:
    # 기본 캐시 TTL(초)
    default-ttl-seconds: ${CACHE_DEFAULT_TTL_SECONDS:3600}
    # 생성할 캐시 이름 목록
    names: [user]
  auth:
    # 인증/보안 기능 on/off
    audit:
      # 감사 로그 저장 여부
      enabled: ${AUTH_AUDIT_ENABLED:true}
      # 감사 로그에 User-Agent 포함 여부
      include-user-agent: ${AUTH_AUDIT_INCLUDE_USER_AGENT:true}
    login-failure:
      # 로그인 실패 잠금 정책 활성화 여부
      enabled: ${AUTH_LOGIN_FAILURE_ENABLED:true}
      # 최대 허용 실패 횟수
      max-attempts: ${AUTH_LOGIN_FAILURE_MAX_ATTEMPTS:5}
      # 잠금 유지 시간(분)
      lock-minutes: ${AUTH_LOGIN_FAILURE_LOCK_MINUTES:15}
    password-reset:
      # 비밀번호 재설정 코드 만료 시간(분)
      code-expire-minutes: ${AUTH_PASSWORD_RESET_CODE_EXPIRE_MINUTES:10}
      # 인증 코드 최대 실패 횟수
      max-verification-attempts: ${AUTH_PASSWORD_RESET_MAX_VERIFICATION_ATTEMPTS:5}
      # 인증 코드 실패 횟수 초과 시 잠금 시간(분)
      verification-lock-minutes: ${AUTH_PASSWORD_RESET_VERIFICATION_LOCK_MINUTES:15}
    mfa:
      # MFA 기능 전역 활성화 여부
      enabled: ${AUTH_MFA_ENABLED:false}
      # OTP 앱에 표시할 issuer 이름
      issuer: ${AUTH_MFA_ISSUER:spring-boot-base}
      # MFA 코드 자릿수
      code-digits: ${AUTH_MFA_CODE_DIGITS:6}
      # MFA time step(초)
      time-step-seconds: ${AUTH_MFA_TIME_STEP_SECONDS:30}
      # 허용 시간 오차 윈도우 수
      allowed-windows: ${AUTH_MFA_ALLOWED_WINDOWS:1}
      # MFA를 필수로 강제할 역할 목록
      required-types: []
  admin:
    # 초기 관리자 계정 자동 생성 활성화 여부
    enabled: ${ADMIN_ENABLED:true}
    # 초기 관리자 로그인 아이디
    username: ${ADMIN_USERNAME:admin}
    # 초기 관리자 비밀번호
    password: ${ADMIN_PASSWORD:Admin1234!}
    # 초기 관리자 표시 이름
    nickname: ${ADMIN_NICKNAME:관리자}
    # 초기 관리자 이메일
    email: ${ADMIN_EMAIL:admin@base.local}
    # 기존 관리자 계정이 이미 있을 때 시작 시 비밀번호를 설정값으로 재설정할지 여부
    reset-password-on-startup: ${ADMIN_RESET_PASSWORD_ON_STARTUP:false}
  token:
    # refresh token 저장 방식
    # refresh token 저장 위치(cache 또는 rdb)
    storage: ${TOKEN_STORAGE:rdb}
    # 사용자당 최대 활성 세션 수
    max-sessions-per-user: ${TOKEN_MAX_SESSIONS_PER_USER:5}
  outbound:
    # 외부 API 연결 타임아웃(초)
    connect-timeout-seconds: ${OUTBOUND_CONNECT_TIMEOUT_SECONDS:5}
    # 외부 API 응답 읽기 타임아웃(초)
    read-timeout-seconds: ${OUTBOUND_READ_TIMEOUT_SECONDS:5}
    retry:
      # 외부 API 재시도 최대 횟수
      max-attempts: ${OUTBOUND_RETRY_MAX_ATTEMPTS:3}
      # 재시도 간 대기 시간(ms)
      delay-millis: ${OUTBOUND_RETRY_DELAY_MILLIS:1000}
    headers:
      # Correlation-Id 전달 여부
      forward-correlation-id: ${OUTBOUND_FORWARD_CORRELATION_ID:true}
      # Idempotency-Key 자동 추가 여부
      add-idempotency-key: ${OUTBOUND_ADD_IDEMPOTENCY_KEY:true}
  privacy:
    # 감사 로그 IP 마스킹 여부
    mask-audit-ip: ${PRIVACY_MASK_AUDIT_IP:true}
    # 개인정보 관련 로그에 User-Agent 포함 여부
    include-user-agent: ${PRIVACY_INCLUDE_USER_AGENT:true}
    # 감사 로그 보관 일수
    audit-retention-days: ${PRIVACY_AUDIT_RETENTION_DAYS:90}
  qr:
    # QR 코드 margin 값
    margin: ${QR_MARGIN:1}
    # QR 코드 문자셋
    charset: ${QR_CHARSET:UTF-8}
    # QR 코드 이미지 포맷
    format: ${QR_FORMAT:PNG}
    # QR 코드 높이(px)
    height: ${QR_HEIGHT:300}
    # QR 코드 너비(px)
    width: ${QR_WIDTH:300}
  security:
    # 보안 헤더 환경별 on/off
    trusted-proxy:
      # true일 때만 X-Forwarded-For 등 프록시 전달 IP 헤더를 신뢰
      forwarded-headers-enabled: ${SECURITY_TRUSTED_PROXY_FORWARDED_HEADERS_ENABLED:false}
    headers:
      # HSTS 헤더 사용 여부
      hsts-enabled: ${SECURITY_HSTS_ENABLED:true}
      # Content-Security-Policy 헤더 값
      content-security-policy: ${SECURITY_CSP:default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'}
      # Referrer-Policy 헤더 값
      referrer-policy: ${SECURITY_REFERRER_POLICY:strict-origin-when-cross-origin}
  email:
    # SMTP 메일 발송 설정. enabled=true 이면 필수값 누락 시 부팅 실패
    # 이메일 기능 활성화 여부
    enabled: ${EMAIL_ENABLED:false}
    # SMTP 호스트
    host: ${EMAIL_HOST:localhost}
    # SMTP 포트
    port: ${EMAIL_PORT:587}
    # SMTP 사용자명
    username: ${EMAIL_USERNAME:}
    # SMTP 비밀번호
    password: ${EMAIL_PASSWORD:}
    # 메일 프로토콜
    protocol: ${EMAIL_PROTOCOL:smtp}
    # SMTP AUTH 사용 여부
    auth: ${EMAIL_AUTH:true}
    # STARTTLS 사용 여부
    starttls: ${EMAIL_STARTTLS:true}
    # 발신자 이메일 주소
    from-address: ${EMAIL_FROM_ADDRESS:}
    # 발신자 표시 이름
    from-name: ${EMAIL_FROM_NAME:spring-boot-base}
    # SMTP 연결 타임아웃(ms)
    connect-timeout-millis: ${EMAIL_CONNECT_TIMEOUT_MILLIS:5000}
    # SMTP 읽기 타임아웃(ms)
    read-timeout-millis: ${EMAIL_READ_TIMEOUT_MILLIS:5000}
    # SMTP 쓰기 타임아웃(ms)
    write-timeout-millis: ${EMAIL_WRITE_TIMEOUT_MILLIS:5000}
  firebase:
    # Firebase Admin SDK 설정. enabled=true 이면 credentials 누락 시 부팅 실패
    # Firebase 기능 활성화 여부
    enabled: ${FIREBASE_ENABLED:false}
    # Firebase 프로젝트 ID
    project-id: ${FIREBASE_PROJECT_ID:}
    # 서비스 계정 JSON 파일 경로
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    # 서비스 계정 JSON 본문
    credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
    # Firebase Realtime Database URL
    database-url: ${FIREBASE_DATABASE_URL:}

management:
  # Actuator 웹 엔드포인트 설정
  endpoints:
    web:
      exposure:
        # 외부 노출할 actuator endpoint 목록
        include: health, metrics, prometheus
  endpoint:
    health:
      # health 상세정보 노출 수준
      show-details: always
    prometheus:
      # prometheus endpoint 활성화 여부
      enabled: true
    metrics:
      # metrics endpoint 활성화 여부
      enabled: true
  health:
    redis:
      # Redis health indicator 활성화 여부
      enabled: false
  metrics:
    tags:
      # 모든 metric에 공통으로 붙일 application 태그
      application: ${SPRING_APPLICATION_NAME:spring-boot-base}
  prometheus:
    metrics:
      export:
        # prometheus registry export 활성화 여부
        enabled: true

storage:
  local:
    # 로컬 스토리지 fallback 경로
    # 로컬 파일 실제 저장 루트 경로
    path: ${STORAGE_LOCAL_PATH:./uploads}
    # 로컬 파일 공개/다운로드 URL prefix
    prefix: /api/v1/files/content
  upload:
    # 업로드 기능 활성화 여부
    enabled: ${STORAGE_UPLOAD_ENABLED:true}
    # 업로드 최대 파일 크기
    max-file-size: ${STORAGE_UPLOAD_MAX_FILE_SIZE:10MB}
    # 이중 확장자 차단 여부
    block-double-extension: ${STORAGE_UPLOAD_BLOCK_DOUBLE_EXTENSION:true}
  cleanup:
    # soft delete된 파일 정리 cron
    cron: ${STORAGE_ORGANIZE_CRON:0 0 3 * * *}
    # 한 번에 정리할 파일 수
    chunk-size: ${STORAGE_CHUNK_SIZE:1000}
