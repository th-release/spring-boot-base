spring:
  config:
    activate:
      on-profile: env
  cloud:
    aws:
      # env 프로필은 커스텀 기능 값을 환경변수로 받는 배포 전용 프로필
      s3:
        bucket: ${AWS_S3_BUCKET:}
      region:
        static: ${AWS_REGION:ap-northeast-2}
      credentials:
        access-key: ${AWS_ACCESS_KEY:}
        secret-key: ${AWS_SECRET_KEY:}

app:
  cors:
    allowedOrigins:
      - ${CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
      - ${CORS_ALLOWED_ORIGIN_2:http://localhost:8080}
    allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
    allowedHeaders: ["*"]
    exposedHeaders: ["Authorization", "Refresh-Token"]
    allowCredentials: true
    maxAge: 3600
  database:
    jpa-schema: ${JPA_SCHEMA:${DATABASE_SCHEMA:public}}
    flyway-schema: ${FLYWAY_SCHEMA:${DATABASE_SCHEMA:public}}
  logging:
    request: true
    response: false
    exclude-urls: [/api/actuator, /api/swagger, /api/swagger-ui, /api/v3/api-docs]
    sensitive-fields: [password, newPassword, confirmPassword, accessToken, refreshToken, token, authorization, refresh_token, access_token, idToken, session, sessionid, sessiontoken, clientSecret, secret, secretkey, apiKey, api_key, privatekey, credential, credentials, otp, code, authcode, setcookie, cookie]
    sensitive-value-patterns: ['(?i)Bearer\s+[A-Za-z0-9._~+/\-=]+', '\b[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b', '(?i)(sk|rk)_[A-Za-z0-9]{16,}', '(?i)AKIA[0-9A-Z]{16}']
    max-payload-size: 1024
  swagger:
    scheme: bearer
    title: title
    description: description
    version: 1.0.0
  i18n:
    enabled: ${I18N_ENABLED:true}
    default-locale: ${I18N_DEFAULT_LOCALE:ko}
    supported-locales: [ko, en]
  redis:
    # Redis 캐시 및 토큰 저장 설정
    enabled: ${REDIS_ENABLED:false}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    cache-prefix: ${REDIS_CACHE_PREFIX:v1}
  jwt:
    # JWT 서명 키
    secret-key: ${JWT_SECRET_KEY:4zB0ZR7iYAfapSSkFfQKP33FYQHJx3o/frfaL2oZNvM9OvWt5IPUZaTH+3imbJGaNDN68VHWaCmB+IdyQHmWKQ==}
  cache:
    default-ttl-seconds: ${CACHE_DEFAULT_TTL_SECONDS:3600}
    names: [user]
  auth:
    # 인증/보안 기능 on/off
    audit:
      enabled: ${AUTH_AUDIT_ENABLED:true}
      include-user-agent: ${AUTH_AUDIT_INCLUDE_USER_AGENT:true}
    login-failure:
      enabled: ${AUTH_LOGIN_FAILURE_ENABLED:true}
      max-attempts: ${AUTH_LOGIN_FAILURE_MAX_ATTEMPTS:5}
      lock-minutes: ${AUTH_LOGIN_FAILURE_LOCK_MINUTES:15}
    password-reset:
      code-expire-minutes: ${AUTH_PASSWORD_RESET_CODE_EXPIRE_MINUTES:10}
    mfa:
      enabled: ${AUTH_MFA_ENABLED:false}
      issuer: ${AUTH_MFA_ISSUER:spring-boot-base}
      code-digits: ${AUTH_MFA_CODE_DIGITS:6}
      time-step-seconds: ${AUTH_MFA_TIME_STEP_SECONDS:30}
      allowed-windows: ${AUTH_MFA_ALLOWED_WINDOWS:1}
      required-roles: []
  token:
    # refresh token 저장 방식
    storage: ${TOKEN_STORAGE:rdb}
    max-sessions-per-user: ${TOKEN_MAX_SESSIONS_PER_USER:5}
  outbound:
    connect-timeout-seconds: ${OUTBOUND_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${OUTBOUND_READ_TIMEOUT_SECONDS:5}
    retry:
      max-attempts: ${OUTBOUND_RETRY_MAX_ATTEMPTS:3}
      delay-millis: ${OUTBOUND_RETRY_DELAY_MILLIS:1000}
    headers:
      forward-correlation-id: ${OUTBOUND_FORWARD_CORRELATION_ID:true}
      add-idempotency-key: ${OUTBOUND_ADD_IDEMPOTENCY_KEY:true}
  privacy:
    mask-audit-ip: ${PRIVACY_MASK_AUDIT_IP:true}
    include-user-agent: ${PRIVACY_INCLUDE_USER_AGENT:true}
    audit-retention-days: ${PRIVACY_AUDIT_RETENTION_DAYS:90}
  qr:
    margin: ${QR_MARGIN:1}
    charset: ${QR_CHARSET:UTF-8}
    format: ${QR_FORMAT:PNG}
    height: ${QR_HEIGHT:300}
    width: ${QR_WIDTH:300}
  security:
    # 보안 헤더 환경별 on/off
    headers:
      hsts-enabled: ${SECURITY_HSTS_ENABLED:true}
      content-security-policy: ${SECURITY_CSP:default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'}
      referrer-policy: ${SECURITY_REFERRER_POLICY:strict-origin-when-cross-origin}
  email:
    # SMTP 메일 발송 설정. enabled=true 이면 필수값 누락 시 부팅 실패
    enabled: ${EMAIL_ENABLED:false}
    host: ${EMAIL_HOST:localhost}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    protocol: ${EMAIL_PROTOCOL:smtp}
    auth: ${EMAIL_AUTH:true}
    starttls: ${EMAIL_STARTTLS:true}
    from-address: ${EMAIL_FROM_ADDRESS:}
    from-name: ${EMAIL_FROM_NAME:spring-boot-base}
    connect-timeout-millis: ${EMAIL_CONNECT_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${EMAIL_READ_TIMEOUT_MILLIS:5000}
    write-timeout-millis: ${EMAIL_WRITE_TIMEOUT_MILLIS:5000}
  firebase:
    # Firebase Admin SDK 설정. enabled=true 이면 credentials 누락 시 부팅 실패
    enabled: ${FIREBASE_ENABLED:false}
    project-id: ${FIREBASE_PROJECT_ID:}
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
    database-url: ${FIREBASE_DATABASE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
  health:
    redis:
      enabled: false
  metrics:
    tags:
      application: ${SPRING_APPLICATION_NAME:spring-boot-base}
  prometheus:
    metrics:
      export:
        enabled: true

storage:
  local:
    # 로컬 스토리지 fallback 경로
    path: ${STORAGE_LOCAL_PATH:./uploads}
    prefix: /api/v1/files/content
  upload:
    enabled: ${STORAGE_UPLOAD_ENABLED:true}
    max-file-size: ${STORAGE_UPLOAD_MAX_FILE_SIZE:10MB}
    block-double-extension: ${STORAGE_UPLOAD_BLOCK_DOUBLE_EXTENSION:true}
  cleanup:
    cron: "0 0 3 * * *"
    chunk-size: 100
