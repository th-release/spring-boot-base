spring:
  config:
    activate:
      on-profile: prod
  cloud:
    aws:
      # prod 프로필용 AWS/S3 설정
      s3:
        bucket: prod-bucket
      region:
        static: ap-northeast-2
      credentials:
        access-key: prod-access-key
        secret-key: prod-secret-key

crypto:
  aes:
    # prod 프로필용 AES 키
    secret-key: "R3zmKTgCnAp1m0zRd5DCVmTA3GQhYPYd+iJsbk1+l9c="

app:
  redis:
    # prod 캐시/토큰 저장 관련 Redis 설정
    enabled: true
    host: prod-redis.internal
    port: "6379"
    cache-prefix: v1
  cache:
    # 캐시 기본 TTL과 캐시 이름
    default-ttl-seconds: 3600
    names:
      - user
  jwt:
    # prod 프로필용 JWT 서명 키
    secret-key: "4zB0ZR7iYAfapSSkFfQKP33FYQHJx3o/frfaL2oZNvM9OvWt5IPUZaTH+3imbJGaNDN68VHWaCmB+IdyQHmWKQ=="
  token:
    # refresh token 저장 방식과 세션 정책
    storage: rdb
    max-sessions-per-user: 5
    validate-schema: true
  auth:
    # 인증/보안 기능 정책
    audit:
      enabled: true
      include-user-agent: true
    login-failure:
      enabled: true
      max-attempts: 5
      lock-minutes: 15
    password-reset:
      code-expire-minutes: 10
    mfa:
      enabled: true
      issuer: spring-boot-base
      code-digits: 6
      time-step-seconds: 30
      allowed-windows: 1
      required-roles: []
  outbound:
    # 외부 API 호출 정책
    connect-timeout-seconds: 5
    read-timeout-seconds: 5
    retry:
      max-attempts: 3
      delay-millis: 1000
    headers:
      forward-correlation-id: true
      add-idempotency-key: true
  privacy:
    # 개인정보 보호 정책
    mask-audit-ip: true
    include-user-agent: true
    audit-retention-days: 90
  qr:
    # QR 코드 생성 옵션
    margin: 1
    charset: UTF-8
    format: PNG
    height: 300
    width: 300
  security:
    # 운영 보안 헤더 정책
    headers:
      hsts-enabled: true
      content-security-policy: "default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
      referrer-policy: strict-origin-when-cross-origin
  email:
    # 운영 SMTP 메일 발송 설정
    enabled: false
    host: smtp.prod.internal
    port: 587
    username: prod-user
    password: prod-password
    protocol: smtp
    auth: true
    starttls: true
    from-address: no-reply@prod.base
    from-name: spring-boot-base
    connect-timeout-millis: 5000
    read-timeout-millis: 5000
    write-timeout-millis: 5000
  firebase:
    # 운영 Firebase Admin SDK 설정
    enabled: false
    project-id: prod-project
    credentials-path: ""
    credentials-json: ""
    database-url: ""
management:
  # prod actuator 노출 범위는 최소화
  endpoints:
    web:
      exposure:
        include: health, prometheus

storage:
  local:
    # 로컬 스토리지 fallback 경로
    path: ./uploads
    prefix: /api/files
  upload:
    # 운영 업로드 보안 정책
    enabled: true
    max-file-size-bytes: 10485760
    block-double-extension: true
    allowed-extensions: [jpg, jpeg, png, gif, pdf, txt, csv]
    allowed-content-types: [image/jpeg, image/png, image/gif, application/pdf, text/plain, text/csv]
  cleanup:
    # 고아 파일 정리 배치
    cron: "0 0 3 * * *"
    chunk-size: 100
