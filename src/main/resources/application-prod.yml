spring:
  config:
    activate:
      on-profile: prod
  cloud:
    aws:
      # prod 프로필용 AWS/S3 설정
      s3:
        bucket: prod-bucket
      region:
        static: ap-northeast-2
      credentials:
        access-key: prod-access-key
        secret-key: prod-secret-key

app:
  cors:
    allowedOrigins: [http://localhost:3000, http://localhost:8080]
    allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
    allowedHeaders: ["*"]
    exposedHeaders: ["Authorization", "Refresh-Token"]
    allowCredentials: true
    maxAge: 3600
  database:
    jpa-schema: public
    flyway-schema: public
  logging:
    request: true
    response: false
    exclude-urls: [/api/actuator, /api/swagger, /api/swagger-ui, /api/v3/api-docs]
    sensitive-fields: [password, newPassword, confirmPassword, accessToken, refreshToken, token, authorization, refresh_token, access_token, idToken, session, sessionid, sessiontoken, clientSecret, secret, secretkey, apiKey, api_key, privatekey, credential, credentials, otp, code, authcode, setcookie, cookie]
    sensitive-value-patterns: ['(?i)Bearer\s+[A-Za-z0-9._~+/\-=]+', '\b[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\b', '(?i)(sk|rk)_[A-Za-z0-9]{16,}', '(?i)AKIA[0-9A-Z]{16}']
    max-payload-size: 1024
  swagger:
    scheme: bearer
    title: title
    description: description
    version: 1.0.0
  i18n:
    enabled: true
    default-locale: ko
    supported-locales: [ko, en]
  redis:
    # prod 캐시/토큰 저장 관련 Redis 설정
    enabled: true
    host: prod-redis.internal
    port: "6379"
    cache-prefix: v1
  jwt:
    # prod 프로필용 JWT 서명 키
    secret-key: "4zB0ZR7iYAfapSSkFfQKP33FYQHJx3o/frfaL2oZNvM9OvWt5IPUZaTH+3imbJGaNDN68VHWaCmB+IdyQHmWKQ=="
  cache:
    default-ttl-seconds: 3600
    names: [user]
  token:
    # refresh token 저장 방식
    storage: rdb
    max-sessions-per-user: 5
  auth:
    # 인증/보안 기능 정책
    audit:
      enabled: true
      include-user-agent: true
    login-failure:
      enabled: true
      max-attempts: 5
      lock-minutes: 15
    password-reset:
      code-expire-minutes: 10
    mfa:
      enabled: true
      issuer: spring-boot-base
      code-digits: 6
      time-step-seconds: 30
      allowed-windows: 1
      required-roles: []
  outbound:
    connect-timeout-seconds: 5
    read-timeout-seconds: 5
    retry:
      max-attempts: 3
      delay-millis: 1000
    headers:
      forward-correlation-id: true
      add-idempotency-key: true
  privacy:
    mask-audit-ip: true
    include-user-agent: true
    audit-retention-days: 90
  qr:
    margin: 1
    charset: UTF-8
    format: PNG
    height: 300
    width: 300
  security:
    # 운영 보안 헤더 정책
    headers:
      hsts-enabled: true
      content-security-policy: "default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
      referrer-policy: strict-origin-when-cross-origin
  email:
    # 운영 SMTP 메일 발송 설정
    enabled: false
    host: smtp.prod.internal
    port: 587
    username: prod-user
    password: prod-password
    protocol: smtp
    auth: true
    starttls: true
    from-address: no-reply@prod.base
    from-name: spring-boot-base
    connect-timeout-millis: 5000
    read-timeout-millis: 5000
    write-timeout-millis: 5000
  firebase:
    # 운영 Firebase Admin SDK 설정
    enabled: false
    project-id: prod-project
    credentials-path: ""
    credentials-json: ""
    database-url: ""
management:
  # prod actuator 노출 범위는 최소화
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
    metrics:
      enabled: true
  health:
    redis:
      enabled: false
  metrics:
    tags:
      application: spring-boot-base
  prometheus:
    metrics:
      export:
        enabled: true

storage:
  local:
    # 로컬 스토리지 fallback 경로
    path: ./uploads
    prefix: /api/v1/files/content
  upload:
    enabled: true
    max-file-size: 10MB
    block-double-extension: true
  cleanup:
    cron: "0 0 3 * * *"
    chunk-size: 100
