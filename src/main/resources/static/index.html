<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot + React Static Test</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="root">
        <h1>Spring Boot Static Serving Test</h1>
        <p id="status">JavaScript is loading...</p>
        <div class="info">
            <p><strong>Backend API:</strong> <code id="api-path">/api/**</code></p>
            <p><strong>Frontend View:</strong> <code id="view-path">/*</code> (SPA Routing Enabled)</p>
        </div>
        <button id="test-btn">Check API Status</button>
    </div>
    <script src="/script.js"></script>
</body>
</html>
